name: Build Signed APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2️⃣ Set up JDK
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: 21

      # 3️⃣ Grant execute permission for gradlew
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # 4️⃣ Build signed APK
      - name: Build Release APK
        run: ./gradlew assembleRelease -Pandroid.injected.signing.store.file=app/brahman-release-key.jks \
          -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
          -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
          -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      # 5️⃣ Upload APK as artifact
      - name: Upload APK
        uses: actions/upload-artifact@v3.2.0
        with:
          name: BrahmanBrowser-APK
          path: app/build/outputs/apk/release/app-release.apk
